name: Deploy Mockly to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAGES: "true"
    steps:
      - name: Download source
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set repository base path
        shell: bash
        run: |
          repository_name="${GITHUB_REPOSITORY#*/}"
          if [[ "$repository_name" == *.github.io ]]; then
            base_path=""
          else
            base_path="/$repository_name"
          fi
          echo "NEXT_PUBLIC_BASE_PATH=$base_path" >> "$GITHUB_ENV"
          echo "NEXT_PUBLIC_SITE_URL=https://${GITHUB_REPOSITORY_OWNER}.github.io" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci

      - name: Build static website
        run: npm run build:pages

      - name: Disable Jekyll processing
        run: touch out/.nojekyll

      - name: Upload GitHub Pages website
        uses: actions/upload-pages-artifact@v4
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Publish website
        id: deployment
        uses: actions/deploy-pages@v4
